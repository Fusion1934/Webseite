<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio - Joaquin Sack</title>
    <link rel="stylesheet" href="Style/style_base.css" />
    <link rel="stylesheet" href="Style/style_start.css" />
</head>

<body class="start-body">
    <main class="page start-page">
        <div class="hero-container">
            <h1 class="hero-title">PORTFOLIO</h1>
            <div class="tags-container">
                <!-- We use the Labels.png for the skill tags -->
                <img src="Image/Labels.png" alt="Design, User Experience, 3D Modelling, Human centered design labels"
                    class="tags-image" />

                <!-- Independent Cursor Element -->
                <div class="custom-cursor-label">
                    <img src="Image/Group 3.png" alt="Joaquin Sack cursor" class="cursor-image" />
                </div>
            </div>
        </div>

        <div class="cards-container">
            <a href="#" class="preview-card card-work logo-item" aria-label="Work Projects">
                <span class="logo-label">Work</span>
                <div class="card-inner">
                    <!-- Left blank as a placeholder for a future site preview -->
                </div>
            </a>

            <a href="Skills.html" class="preview-card card-skills logo-item" aria-label="Skills">
                <span class="logo-label">Skills</span>
                <div class="card-inner">
                    <div class="iframe-wrapper">
                        <iframe src="Skills.html" tabindex="-1" scrolling="no" aria-hidden="true"></iframe>
                        <div class="iframe-overlay"></div>
                    </div>
                    <div class="close-card-btn" aria-label="Close card">&times;</div>
                </div>
            </a>

            <a href="#" class="preview-card card-about logo-item" aria-label="About Me">
                <span class="logo-label">About Me</span>
                <div class="card-inner">
                    <!-- Left blank as a placeholder for a future site preview -->
                </div>
            </a>

            <a href="Contact.html" class="preview-card card-contact logo-item" aria-label="Contact">
                <span class="logo-label">Contact</span>
                <div class="card-inner">
                    <div class="iframe-wrapper">
                        <iframe src="Contact.html" tabindex="-1" scrolling="no" aria-hidden="true"></iframe>
                        <div class="iframe-overlay"></div>
                    </div>
                    <div class="close-card-btn" aria-label="Close card">&times;</div>
                </div>
            </a>
        </div>
    </main>
    <script src="Script/hover.js"></script>
    <script src="Script/script_start.js"></script>
</body>

</html>
