<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <link rel="stylesheet" href="Style/style_base.css" />
  <link rel="stylesheet" href="Style/style_contact.css" />
</head>

<body>
  <main class="page">
    <header class="top-bar">
      <h1>Contact</h1>
      <button class="close-button" aria-label="Close contact page">
        <span></span>
        <span></span>
      </button>
      <div class="accent-line" aria-hidden="true"></div>
    </header>

    <section class="contact-list" aria-label="Contact links">
      <p><a href="mailto:joaquinsack.uxd@gmail.com" class="primary">Email: joaquinsack.uxd@gmail.com</a></p>
      <p><a href="#" target="_blank" rel="noreferrer">Instagram: UXD_art</a></p>
      <p><a href="#" target="_blank" rel="noreferrer">Linkedin: Joaquin Sack</a></p>
      <p><a href="https://github.com/Fusion1934" target="_blank" rel="noreferrer">Github: Fusion1934</a></p>
    </section>

    <aside class="note" aria-label="Personal note">
      <p>Feel free to reach out, if you have any questions.</p>
      <p class="signature">- Joaquin</p>
    </aside>
  </main>
  <script src="Script/drag_notes.js"></script>
  <script src="Script/cursor.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const closeBtn = document.querySelector('.close-button');
      if (!closeBtn) return;

      closeBtn.addEventListener('click', () => {
        window.parent.postMessage('close-iframe', '*');
      });

      // Hide close button when rendered as a card thumbnail in an iframe
      if (window.self !== window.top) {
        closeBtn.style.display = 'none';
        window.addEventListener('message', (e) => {
          if (e.data === 'show-close') closeBtn.style.display = '';
          if (e.data === 'hide-close') closeBtn.style.display = 'none';
        });
      }
    });
  </script>
</body>

</html>
